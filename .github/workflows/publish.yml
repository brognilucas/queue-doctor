name: Publish to npm

on:
  release:
    types: [published]
  workflow_dispatch:

concurrency:
  group: npm-publish
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # Required for npm Trusted Publishing (OIDC)
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          # Must match package.json "packageManager" exactly (not "9").
          version: 9.15.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          # Node 24 ships npm new enough for Trusted Publishing (needs >= 11.5.1).
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: pnpm

      - name: Ensure npm supports Trusted Publishing
        run: npm install -g npm@latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm --filter queue-doctor build

      # setup-node writes an _authToken placeholder; remove it so npm uses OIDC.
      - name: Prefer OIDC over token auth
        run: |
          for f in .npmrc packages/core/.npmrc "$HOME/.npmrc"; do
            if [ -f "$f" ]; then
              sed -i '/_authToken/d' "$f"
            fi
          done

      # Use npm publish (not pnpm) so the OIDC trusted-publisher flow runs.
      # Do not set NODE_AUTH_TOKEN — that forces token auth and skips OIDC.
      - name: Publish queue-doctor
        working-directory: packages/core
        run: npm publish --access public
